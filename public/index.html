<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#667eea" />
    <meta
      name="description"
      content="Assistly - Connect with your neighbors for help and support. Community assistance made simple."
    />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Assistly - Community Assistance Platform</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      // Show a simple loading indicator while app initializes
      document.addEventListener('DOMContentLoaded', function() {
        const root = document.getElementById('root');
        if (!root.children.length) {
          root.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;"><div style="text-align: center;"><div style="font-size: 24px; font-weight: 600; color: #667eea; margin-bottom: 16px;">Assistly</div><div style="color: #666; font-size: 14px;">Loading...</div></div></div>';
        }
      });
    </script>
  </body>
</html>
